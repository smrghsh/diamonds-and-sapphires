<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>diamond rings</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .ctrl {
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 7px 16px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: center;
    appearance: none;
    -webkit-appearance: none;
  }
  .ctrl:hover {
    border-color: rgba(255,255,255,0.6);
    color: #fff;
  }
  #autorotate.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
  }
  select.ctrl option {
    background: #111;
    color: #fff;
  }
</style>
</head>
<body>
<div id="controls">
  <button id="randomize" class="ctrl">randomize</button>
  <button id="less" class="ctrl">less</button>
  <button id="more" class="ctrl">more</button>
  <select id="gem" class="ctrl">
    <option value="sapphire">✦ sapphire</option>
    <option value="ruby">✦ ruby</option>
    <option value="emerald">✦ emerald</option>
    <option value="topaz">✦ topaz</option>
    <option value="opal">✦ opal</option>
  </select>
  <button id="autorotate" class="ctrl">auto rotate</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const PARTICLES_PER_RING = 120;

let rings = [];
let densityMult = 1.0;
let autoRotate = false;
let autoRotateAngle = 0;
let gemType = 'sapphire';

const GEM = {
  sapphire: () => ({ hue: random(210, 240), sat: random(70, 95), bri: random(75, 100) }),
  ruby:     () => ({ hue: random(345, 360),  sat: random(80, 95), bri: random(75, 100) }),
  emerald:  () => ({ hue: random(130, 155),  sat: random(70, 90), bri: random(70, 95)  }),
  topaz:    () => ({ hue: random(35,  50),   sat: random(75, 92), bri: random(80, 100) }),
  opal:     (j) => ({ hue: (j / PARTICLES_PER_RING) * 360, sat: random(60, 90), bri: random(80, 100), isOpal: true }),
};

function ringCount() {
  return floor(map(windowWidth, 320, 2560, 60, 240, true) * densityMult);
}

function makeGemParticles() {
  return Array.from({ length: PARTICLES_PER_RING }, (_, j) => {
    let g = GEM[gemType](j);
    return {
      angle:        (j / PARTICLES_PER_RING) * TWO_PI,
      size:         random(1.4, 3.2),
      hue:          g.hue,
      sat:          g.sat,
      bri:          g.bri,
      isOpal:       !!g.isOpal,
      flickerSpeed: random(0.02, 0.09),
      flickerPhase: random(TWO_PI),
    };
  });
}

function makeRings() {
  rings = [];
  for (let i = 0; i < ringCount(); i++) {
    let r = {
      radius:    random(40, 380),
      tiltX:     random(TWO_PI),
      tiltY:     random(TWO_PI),
      tiltZ:     random(TWO_PI),
      cx:        random(-500, 500),
      cy:        random(-500, 500),
      cz:        random(-600, 200),
      speed:     random(0.001, 0.004) * (random() > 0.5 ? 1 : -1),
      phase:     random(TWO_PI),
      gem:       false,
      particles: Array.from({ length: PARTICLES_PER_RING }, (_, j) => ({
        angle:        (j / PARTICLES_PER_RING) * TWO_PI,
        size:         random(1.2, 3.8),
        hue:          random() > 0.7 ? random(195, 230) : random(40, 60),
        sat:          random(0, 30),
        bri:          random(80, 100),
        isOpal:       false,
        flickerSpeed: random(0.02, 0.09),
        flickerPhase: random(TWO_PI),
      }))
    };
    rings.push(r);

    if (i % 3 === 0) {
      rings.push({
        ...r,
        cx:       r.cx + random(-18, 18),
        cy:       r.cy + random(-18, 18),
        cz:       r.cz + random(-18, 18),
        radius:   r.radius + random(-8, 8),
        gem:      true,
        phase:    r.phase + random(0.05, 0.2),
        particles: makeGemParticles(),
      });
    }
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 100);
  frameRate(60);
  noStroke();
  makeRings();
}

function draw() {
  orbitControl();
  background(0, 0, 3, 18);

  if (autoRotate) {
    autoRotateAngle += 0.003;
    rotateY(autoRotateAngle);
  }

  let t = frameCount * 0.001;

  for (let r of rings) {
    push();
    translate(r.cx, r.cy, r.cz);
    rotateX(r.tiltX);
    rotateY(r.tiltY + t * r.speed * 60);
    rotateZ(r.tiltZ);
    r.phase += r.speed;

    for (let p of r.particles) {
      let flicker = 0.5 + 0.5 * sin(frameCount * p.flickerSpeed + p.flickerPhase);
      let alpha   = flicker * flicker * 92 + 8;
      let bri     = p.bri * (0.6 + 0.4 * flicker);
      let hue     = p.hue;

      // opal: cycle hue over time per particle, like shifting fire in the stone
      if (p.isOpal) {
        hue = (p.hue + frameCount * 0.4 + p.angle * 40) % 360;
      }

      let x = cos(p.angle + r.phase) * r.radius;
      let y = sin(p.angle + r.phase) * r.radius;

      fill(hue, p.sat, bri, alpha);
      push();
      translate(x, y, 0);
      sphere(p.size * (0.5 + 0.5 * flicker), 3, 3);
      pop();
    }
    pop();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

document.getElementById('randomize').addEventListener('click', makeRings);

document.getElementById('gem').addEventListener('change', (e) => {
  gemType = e.target.value;
  makeRings();
});

document.getElementById('autorotate').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('autorotate').classList.toggle('active', autoRotate);
});

document.getElementById('less').addEventListener('click', () => {
  densityMult = max(0.25, densityMult - 0.5);
  makeRings();
});

document.getElementById('more').addEventListener('click', () => {
  densityMult = min(4.0, densityMult + 0.5);
  makeRings();
});
</script>
</body>
</html>
