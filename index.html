<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>diamond rings</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const NUM_RINGS = 180;
const PARTICLES_PER_RING = 120;

let rings = [];

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();

  for (let i = 0; i < NUM_RINGS; i++) {
    let r = {
      radius:    random(40, 380),
      tiltX:     random(TWO_PI),
      tiltY:     random(TWO_PI),
      tiltZ:     random(TWO_PI),
      cx:        random(-500, 500),
      cy:        random(-500, 500),
      cz:        random(-600, 200),
      speed:     random(0.0003, 0.0012) * (random() > 0.5 ? 1 : -1),
      phase:     random(TWO_PI),
      sapphire:  false,
      particles: Array.from({ length: PARTICLES_PER_RING }, (_, j) => ({
        angle:     (j / PARTICLES_PER_RING) * TWO_PI,
        size:      random(1.2, 3.8),
        hue:       random() > 0.7 ? random(195, 230) : random(40, 60),
        sat:       random(0, 30),
        bri:       random(80, 100),
        flickerSpeed: random(0.02, 0.09),
        flickerPhase: random(TWO_PI),
      }))
    };
    rings.push(r);

    // 1 in 20: duplicate as a sapphire ghost ring, slightly offset
    if (i % 20 === 0) {
      rings.push({
        ...r,
        cx: r.cx + random(-18, 18),
        cy: r.cy + random(-18, 18),
        cz: r.cz + random(-18, 18),
        radius: r.radius + random(-8, 8),
        sapphire: true,
        phase: r.phase + random(0.05, 0.2),
        particles: Array.from({ length: PARTICLES_PER_RING }, (_, j) => ({
          angle:     (j / PARTICLES_PER_RING) * TWO_PI,
          size:      random(1.4, 3.2),
          hue:       random(210, 240), // sapphire blue
          sat:       random(70, 95),
          bri:       random(75, 100),
          flickerSpeed: random(0.02, 0.09),
          flickerPhase: random(TWO_PI),
        }))
      });
    }
  }
}

function draw() {
  background(0, 0, 3, 18); // slow trail fade

  let t = frameCount * 0.001;

  for (let r of rings) {
    push();
    translate(r.cx, r.cy, r.cz);
    rotateX(r.tiltX);
    rotateY(r.tiltY + t * r.speed * 60);
    rotateZ(r.tiltZ);

    r.phase += r.speed;

    for (let p of r.particles) {
      let flicker = 0.5 + 0.5 * sin(frameCount * p.flickerSpeed + p.flickerPhase);
      let alpha   = flicker * flicker * 92 + 8; // non-linear sparkle
      let bri     = p.bri * (0.6 + 0.4 * flicker);

      let x = cos(p.angle + r.phase) * r.radius;
      let y = sin(p.angle + r.phase) * r.radius;

      fill(p.hue, p.sat, bri, alpha);
      push();
      translate(x, y, 0);
      sphere(p.size * (0.5 + 0.5 * flicker), 3, 3);
      pop();
    }
    pop();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
